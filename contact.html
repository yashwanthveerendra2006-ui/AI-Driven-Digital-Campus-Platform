<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>

<body class="bg-blue-50">

<div class="max-w-6xl mx-auto px-6 py-16">

  <!-- Header -->
  <header class="text-center mb-16">
    <h1 class="text-4xl font-bold text-gray-900 mb-4">Contact Us</h1>
    <p class="text-lg text-gray-600">
      We'd love to hear from you. Send us a message and we'll respond as soon as possible.
    </p>
  </header>

  <div class="grid lg:grid-cols-5 gap-12">

    <!-- Contact Info -->
    <div class="lg:col-span-2 space-y-6">

      <div class="bg-white rounded-2xl p-6 shadow">
        <h3 class="font-semibold text-gray-900 mb-1">Email Us</h3>
        <p class="text-blue-600 font-medium">adckkd@ac.in</p>
      </div>

      <div class="bg-white rounded-2xl p-6 shadow">
        <h3 class="font-semibold text-gray-900 mb-1">Call Us</h3>
        <p class="text-blue-600 font-medium">0884 2376663</p>
      </div>

      <div class="bg-white rounded-2xl p-6 shadow">
        <h3 class="font-semibold text-gray-900 mb-1">Visit Us</h3>
        <p class="text-gray-600">
          ADITYA DEGREE COLLEGE<br>
          Lakshmi Narayana Nagar<br>
          Kakinada - 533003
        </p>
      </div>
    </div>

    <!-- Form -->
    <div class="lg:col-span-3">
      <div class="bg-white rounded-3xl p-8 shadow">

        <h2 class="text-2xl font-bold text-gray-900 mb-2">Send us a message</h2>
        <p class="text-gray-500 mb-8">Fill out the form below.</p>

        <!-- ✅ FORMSPREE FORM -->
        <form 
          action="https://formspree.io/f/xvzbkypz"
          method="POST" 
          class="space-y-6">

          <input type="hidden" name="_subject" value="New Contact Message">

          <div class="grid md:grid-cols-2 gap-6">
            <input type="text" name="Name" required placeholder="Name"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-100 outline-none">

            <input type="email" name="Email" required placeholder="Email"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-100 outline-none">
          </div>

          <input type="text" name="Subject" required placeholder="Subject"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-100 outline-none">

          <textarea name="Message" rows="5" required placeholder="Message"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-100 outline-none resize-none"></textarea>

          <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl">
            Send Message
          </button>
        </form>

      </div>
    </div>
  </div>
</div>

</body>
</html>
